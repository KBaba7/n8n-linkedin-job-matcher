# Render.com Blueprint for N8N Job Matcher

services:
  - type: web
    name: n8n-job-matcher
    env: docker
    image:
      url: docker.io/n8nio/n8n:latest
    plan: free
    region: oregon
    envVars:
      - key: N8N_BASIC_AUTH_ACTIVE
        value: true
      - key: N8N_BASIC_AUTH_USER
        value: admin
      - key: N8N_BASIC_AUTH_PASSWORD
        generateValue: true
      - key: N8N_PORT
        value: 5678
      - key: N8N_PROTOCOL
        value: https
      - key: WEBHOOK_URL
        value: https://n8n-job-matcher.onrender.com
      - key: GENERIC_TIMEZONE
        value: America/Los_Angeles
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: APIFY_API_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
